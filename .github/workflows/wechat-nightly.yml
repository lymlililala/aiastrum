name: wechat-nightly

# 玄学/命理公众号内容流水线 —— 每晚自动：采集 → 聚类 → 合成(中英双发) → 发布。
# 发布走强闸门(AI 自评分阈值)+ 单次上限护栏，过线才 upsert 进 mysticai_blog_posts(绝不删旧文)。
#
# 需在仓库 Settings → Secrets and variables → Actions 配置以下 secrets：
#   DEEPSEEK_API_KEY        (必填) DeepSeek key
#   CIMIDATA_APP_ID         (必填) 次幂数据
#   CIMIDATA_APP_SECRET     (必填) 次幂数据
#   PEXELS_API_KEY          (选填) 配图，缺则回退写死玄学图池
#   UNSPLASH_ACCESS_KEY     (选填) 配图回退
#   SUPABASE_SECRET_KEY     (必填) 写库 + 判重
# 可选 vars：DEEPSEEK_BASE_URL / DEEPSEEK_MODEL / SUPABASE_URL
#
# 源文持久化到 Supabase 表 mysticai_wx_sources（WX_SOURCES_DB=1，已默认开启）：
# 每晚 --today 采的新文累积入库，聚类回看 N 天可用跨天素材池。
# 前置：先跑一次 node scripts/wechat/create-sources-table.mjs 建表（需 DB 密码）。
# 判重另比对 mysticai_blog_posts，不会重复发已有选题。

on:
  schedule:
    - cron: '17 19 * * *'   # UTC 19:17 = 北京时间 03:17 每日（避开整点）
  workflow_dispatch:
    inputs:
      threshold:
        description: 'AI 自评分发布阈值'
        default: '80'
      max_publish:
        description: '单次最多发布几组(zh+en 算一组)'
        default: '2'
      max_clusters:
        description: '最多聚类几簇'
        default: '6'
      dry_run:
        description: '只预览不写库(true/false)'
        default: 'false'

concurrency:
  group: wechat-nightly
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
      DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
      CIMIDATA_APP_ID: ${{ secrets.CIMIDATA_APP_ID }}
      CIMIDATA_APP_SECRET: ${{ secrets.CIMIDATA_APP_SECRET }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      WX_SOURCES_DB: '1'
      THRESHOLD: ${{ github.event.inputs.threshold || '80' }}
      MAX_PUBLISH: ${{ github.event.inputs.max_publish || '2' }}
      MAX_CLUSTERS: ${{ github.event.inputs.max_clusters || '6' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: 1) 采集当天新文
        run: node scripts/wechat/1-crawl.mjs --today

      - name: 2) 聚类(品类均衡)
        run: node scripts/wechat/2-cluster.mjs --max-clusters "$MAX_CLUSTERS" --max-per-category 2

      - name: 3) 合成(中英双发)
        run: node scripts/wechat/3-synthesize.mjs

      - name: 4) 发布(强闸门 + 上限)
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            node scripts/wechat/4-publish.mjs --dry-run --threshold "$THRESHOLD" --max-publish "$MAX_PUBLISH"
          else
            node scripts/wechat/4-publish.mjs --threshold "$THRESHOLD" --max-publish "$MAX_PUBLISH"
          fi

      - name: 上传产物(草稿/发布记录，便于复核)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wechat-pipeline-data
          path: |
            scripts/wechat/data/clusters.json
            scripts/wechat/data/drafts.json
            scripts/wechat/data/published.json
          retention-days: 14
          if-no-files-found: ignore
